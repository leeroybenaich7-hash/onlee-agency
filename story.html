<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300..500;1,9..144,300..500&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  html, body { width:1080px; height:1920px; overflow:hidden; }
  body {
    background: radial-gradient(132% 76% at 50% 22%, #99541f 0%, #7c4019 46%, #5d2d12 78%, #46230f 100%);
    color:#EACEAA; font-family:'Inter', sans-serif; position:relative;
    -webkit-font-smoothing:antialiased;
  }
  .glow { position:absolute; top:-300px; left:50%; transform:translateX(-50%); width:1200px; height:1000px;
    background:radial-gradient(circle at 50% 50%, rgba(242,228,204,.17), transparent 62%); pointer-events:none; }
  .vig { position:absolute; inset:0; pointer-events:none;
    background:radial-gradient(125% 92% at 50% 44%, transparent 54%, rgba(28,14,6,.6) 100%); }

  .stage { position:relative; z-index:2; height:100%; display:flex; flex-direction:column; align-items:center;
    padding:236px 110px 250px; text-align:center; }

  .eyebrow { display:flex; align-items:center; gap:22px; font-size:24px; letter-spacing:.42em;
    text-transform:uppercase; font-weight:500; color:#E8CBA2; }
  .eyebrow::before, .eyebrow::after { content:""; width:48px; height:1px; background:#CB9C60; }

  .logo { width:548px; margin-top:82px; filter:drop-shadow(0 18px 40px rgba(30,14,6,.4)); }

  h1 { font-family:'Fraunces', serif; font-weight:300; font-size:152px; line-height:.9; letter-spacing:-.03em;
    color:#F4E6CE; margin-top:70px; }
  h1 em { font-style:italic; }

  .sub { max-width:660px; margin-top:44px; font-size:35px; line-height:1.5; font-weight:300; color:#E6C9A2; }

  .rule { width:84px; height:1px; background:#CB9C60; margin:62px 0; opacity:.75; }

  .cta-label { font-size:25px; letter-spacing:.32em; text-transform:uppercase; color:#DFC198; margin-bottom:30px; }
  .pill { display:inline-flex; align-items:center; gap:24px; background:#EFDBB8; color:#7C4019;
    font-family:'Fraunces', serif; font-weight:400; font-size:66px; letter-spacing:.01em; padding:30px 66px;
    box-shadow:0 26px 60px -22px rgba(28,14,6,.6); }
  .pill .arr { font-family:'Inter', sans-serif; font-size:46px; font-weight:400; }

  .foot { position:absolute; z-index:2; bottom:224px; left:0; right:0; text-align:center;
    font-size:31px; letter-spacing:.18em; color:#E8CBA2; display:flex; align-items:center; justify-content:center; gap:16px; }
  .foot svg { width:34px; height:34px; fill:none; stroke:#E8CBA2; stroke-width:2; }
</style>
</head>
<body>
  <div class="glow"></div>
  <div class="vig"></div>
  <div class="stage">
    <div class="eyebrow">Studio créatif · Paris</div>
    <img class="logo" src="assets/onlee-logo.png" alt="onlee">
    <h1>on <em>crée</em>.</h1>
    <div class="sub">Du dancefloor à l'application, chaque projet est traité comme une pièce.</div>
    <div class="rule"></div>
    <div class="cta-label">Découvrez la collection</div>
    <div class="pill">onlee.fr <span class="arr">&#8599;</span></div>
  </div>
  <div class="foot">
    <svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="5"/><circle cx="12" cy="12" r="4"/><circle cx="17.5" cy="6.5" r="1.2" fill="#E8CBA2" stroke="none"/></svg>
    @onlee.crew
  </div>
</body>
</html>
